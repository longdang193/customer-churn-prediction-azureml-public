# @architecture
# owner: release-monitoring-evaluator
# features:
#   - release-monitoring-evaluator
#   - online-endpoint-deployment
# stages:
#   - monitor
#   - online_deploy
# role: config
# canonical: true
inference_capture:
  enabled: true
  mode: "caller_blob_jsonl"
  sample_rate: 1.0
  max_rows_per_request: 5
  redact_inputs: true
  output_path: "monitoring/inference_capture/caller_side"
  storage_connection_string_env: "INFERENCE_CAPTURE_STORAGE_CONNECTION_STRING"
  storage_container_env: "INFERENCE_CAPTURE_STORAGE_CONTAINER"
