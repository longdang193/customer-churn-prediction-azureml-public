# Data smoke profile for local preflight and low-cost Azure ML data asset checks.
data:
  input_path: "data/smoke/positive/churn_smoke.csv"
  output_dir: "data/processed_smoke"
  target_column: "Exited"
  columns_to_remove:
    - "RowNumber"
    - "CustomerId"
    - "Surname"
  categorical_columns:
    - "Geography"
    - "Gender"
  test_size: 0.2
  random_state: 42
  stratify: true

validation:
  drift_share_threshold: 0.3
  max_missing_fraction: 0.2
  max_row_count_delta_fraction: 0.5
  fail_on_schema_mismatch: true
  fail_on_missing_fraction: true
  fail_on_row_count_delta: false
