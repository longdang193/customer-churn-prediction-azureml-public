# @architecture
# owner: notebook-hpo
# features:
#   - notebook-hpo
#   - model-training-pipeline
# stages:
#   - model_sweep
# role: config
# canonical: true
experiment_name: "hpo-smoke"
sweep_display_name: "hpo-smoke"

metric: "f1"
mode: "max"
sampling_algorithm: "random"

budget:
  max_trials: 2
  max_concurrent: 2

timeouts:
  total_minutes: 60
  trial_minutes: 20

early_stopping:
  enabled: true
  policy: "bandit"
  evaluation_interval: 2
  slack_factor: 0.2

selection:
  secondary_metric: "roc_auc"
  family_priority: ["logreg", "rf", "xgboost"]

search_space:
  model_types: ["logreg", "rf", "xgboost"]
  use_smote: ["true"]

  logreg:
    C: [0.1, 1.0, 10.0]
    solver: ["lbfgs", "liblinear"]

  rf:
    n_estimators: [100, 200]
    max_depth: [4, 6]
    min_samples_split: [2, 5]
    min_samples_leaf: [1, 2]
    max_features: ["sqrt"]

  xgboost:
    n_estimators: [50, 100]
    max_depth: [3, 4]
    learning_rate: [0.05, 0.1]
    subsample: [0.8, 1.0]
    colsample_bytree: [0.6, 0.8]
