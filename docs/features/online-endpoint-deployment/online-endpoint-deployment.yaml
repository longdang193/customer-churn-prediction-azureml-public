type: workflow
summary: Register the model bundle and deploy it to an Azure ML managed online endpoint with a smoke-test payload.
invariants:
  - invariant_id: online-deploy.deployment-consumes-promoted-registered-model-than-loosely
    statement: Deployment consumes a promoted registered model rather than a loosely selected latest artifact.
