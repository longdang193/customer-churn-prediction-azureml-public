    statement: MLflow model bundles used for managed online deployment must carry an Azure ML image-build-safe conda environment.
    state: active
  - invariant_id: online-deploy.configs-assets-yaml-deployment-settings-remain-source
    statement: '`configs/assets.yaml` deployment settings remain the source of truth for smoke payload and inference-capture defaults.'
    state: active
  - invariant_id: online-deploy.every-deployment-should-leave-behind-smoke-test
    statement: Every deployment should leave behind smoke-test evidence and enough metadata to support monitoring follow-up.
    state: active
  - invariant_id: online-deploy.end-end-release-plus-monitor-smoke-automation
    statement: End-to-end release-plus-monitor smoke automation may compose deployment and monitoring, but it must not replace `run_release.py` as the authoritative release surface.
    state: active
  - invariant_id: online-deploy.repeated-releases-reuse-existing-validated-approved-model
    statement: Repeated releases reuse an existing validated approved model version by default when source job, lineage, and candidate model match.
    state: active
  - invariant_id: online-deploy.deployment-failures-after-model-resolution-still-write
    statement: Deployment failures after model resolution still write a diagnostic release record before surfacing the error.
    state: active
  - invariant_id: online-deploy.azure-sdk-deployment-operation-errors-not-automatically
    statement: Azure SDK deployment-operation errors are not automatically terminal; the deployment adapter must check the actual Azure deployment state before classifying the release as failed.
    state: active
  - invariant_id: online-deploy.explicit-deployment-finalization-timeout-unknown-outcomes-after
    statement: Explicit deployment-finalization timeout or unknown outcomes after model resolution must still write a local `release_record.json` with terminal operator guidance.
    state: active
  - invariant_id: online-deploy.monitoring-part-deployment-lifecycle-not-separate-afterthought
    statement: Monitoring is part of the deployment lifecycle, not a separate afterthought.
    state: active
  - invariant_id: online-deploy.deployment-release-may-hand-monitoring-enough-evidence
    statement: Deployment and release may hand monitoring enough evidence to open a retraining candidate, but they must not bypass the later validation, training, promotion, and release gates.
    state: active
  - invariant_id: online-deploy.endpoint-smoke-payloads-validated-locally-before-azure
    statement: Endpoint smoke payloads are validated locally before Azure ML invoke so malformed canary requests fail with operator-readable errors.
    state: active
  - invariant_id: online-deploy.canary-inference-evidence-records-payload-shape-response
    statement: Canary inference evidence records payload shape and response preview only; do not store unbounded raw production inference payloads in release records.
    state: active
  - invariant_id: online-deploy.release-record-json-must-include-explicit-monitoring
    statement: '`release_record.json` must include an explicit `monitoring_handoff` summary so operators can interpret current monitoring readiness without inferring it from scattered deploy and canary fields.'
    state: active
  - invariant_id: online-deploy.release-record-json-must-separate-deployment-owned
    statement: '`release_record.json` must separate deployment-owned capture truth from post-release caller-side monitoring evidence; deployment capture state may be disabled while later monitor bundles still prove caller-side capture-backed monitoring.'
    state: active
  - invariant_id: online-deploy.repeatable-post-release-monitoring-must-reuse-saved
    statement: Repeatable post-release monitoring must reuse the saved `release_record.json` and must not require a fresh deployment just to gather new bounded monitoring evidence.
    state: active
  - invariant_id: online-deploy.managed-online-deployment-now-has-cloud-proven
    statement: Managed online deployment now has a cloud-proven repo-owned scoring contract on the primary path; use `release_record.json > deployment.repo_owned_scoring_status` plus Azure logs as the source of truth for each individual run.
    state: active
  - invariant_id: online-deploy.repo-owned-inference-capture-only-healthy-monitoring
    statement: Repo-owned inference capture is only a healthy monitoring handoff when the configured external sink is cloud-retrievable; configured-but-unproven capture must not upgrade monitoring readiness.
    state: active
  - invariant_id: online-deploy.managed-online-collector-binding-remains-unsupported-current
    statement: Managed online collector binding remains unsupported for the current repo-owned scoring path after bounded Azure probe variants all reproduced the same `inputs_collector` and `outputs_collector` runtime failures; use release evidence or repo-owned capture instead of Azure collector assumptions.
    state: active
