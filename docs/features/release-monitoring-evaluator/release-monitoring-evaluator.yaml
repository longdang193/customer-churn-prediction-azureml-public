  - capability_id: monitor.allow-thin-retraining-loop-orchestrator-continue-run-release
    statement: Allow the thin retraining-loop orchestrator to continue into `run_release.py` only after downstream promotion-facing evidence is proven promotable, while keeping release truth owned by `release_record.json` instead of the loop wrapper.
