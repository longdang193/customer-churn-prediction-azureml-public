  - capability_id: monitor.allow-same-opt-retraining-loop-continuation-compose-run
    statement: Allow the same opt-in retraining-loop continuation to compose `run_monitor_handoff.py` after release, but only as a post-release child surface whose evidence and status stay separate from release truth.
    state: active
  - capability_id: monitor.enforce-bounded-production-checks-including-minimum-sample-count
    statement: Enforce bounded production checks including minimum sample count, feature-count consistency, prediction-distribution availability, and max single-class share.
    state: active
  - capability_id: monitor.preserve-truthful-monitoring-semantics-whether-release-record-reports
    statement: Preserve truthful monitoring semantics whether the release record reports `repo_owned_scoring_proven` or an older fallback runtime classification.
    state: active
  - capability_id: monitor.expose-deployment-owned-capture-truth-caller-side-capture
    statement: Expose deployment-owned capture truth, caller-side capture evidence, and the final evaluator evidence source as separate fields so operators do not have to infer why monitoring was classified as healthy or degraded.
    state: active
  - capability_id: monitor.negative-scorer-probes-may-produce-intentional-azure-scoring
    statement: Negative scorer probes may produce intentional Azure scoring failures, but those probes must not retroactively downgrade healthy release-monitoring handoff truth from the original release artifact.
