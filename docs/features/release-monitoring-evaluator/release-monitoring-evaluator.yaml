feature_id: release-monitoring-evaluator
name: Release monitoring evaluator
status: active
type: workflow
summary: Consume release evidence and optional sampled inference evidence to produce the first bounded monitor-stage report for deployed releases.
invariants:
  - invariant_id: monitor.evaluator-must-treat-release-record-json-primary
    statement: The evaluator must treat `release_record.json` as the primary monitoring handoff artifact.
    state: active
  - invariant_id: monitor.healthy-monitoring-must-work-when-only-trustworthy
    statement: Healthy monitoring must work when the only trustworthy cloud evidence is `release_evidence_only`.
    state: active
  - invariant_id: monitor.evaluator-must-not-assume-repo-owned-scoring
    statement: The evaluator must not assume repo-owned scoring hooks executed unless `deployment.repo_owned_scoring_status` proves that.
    state: active
  - invariant_id: monitor.monitor-outputs-must-stay-bounded-operator-readable
    statement: Monitor outputs must stay bounded and operator-readable; they summarize evidence and findings rather than storing raw production traffic.
    state: active
  - invariant_id: monitor.monitor-triggered-retraining-remains-advisory-evaluator-may
    statement: Monitor-triggered retraining remains advisory; the evaluator may open a retraining candidate, but it must not auto-start train, HPO, promotion, or release.
    state: active
  - invariant_id: monitor.release-plus-monitor-smoke-automation-may-orchestrate
    statement: Release-plus-monitor smoke automation may orchestrate this evaluator, but `run_monitor.py` remains the authoritative monitoring surface.
    state: active
  - invariant_id: monitor.capture-backed-must-explicitly-identify-caller-side
    statement: '`capture_backed` must explicitly identify caller-side evidence; it must not imply that endpoint-side deployment capture was enabled.'
    state: active
  - invariant_id: monitor.repeatable-monitoring-handoff-must-start-saved-release
    statement: Repeatable monitoring handoff must start from a saved `release_record.json` and layer new caller-side evidence on top of release truth instead of rebuilding release state from ad hoc operator inputs.
    state: active
domains:
